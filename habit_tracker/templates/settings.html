{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
            <i class="fas fa-cog text-indigo-500"></i> Settings
        </h2>
        
        <!-- Profile Settings -->
        <div class="mb-8">
            <h3 class="text-lg font-semibold mb-4 border-b pb-2">Profile Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" readonly disabled 
                           class="w-full p-2 bg-gray-100 dark:bg-gray-700 rounded border dark:border-gray-600">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" id="fullName" 
                           class="w-full p-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600">
                </div>
                <button id="updateProfileBtn" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-white transition">
                    <i class="fas fa-save"></i> Save Profile
                </button>
            </div>
        </div>
        
        <!-- Data Management -->
        <div class="mb-8">
            <h3 class="text-lg font-semibold mb-4 border-b pb-2">Data Management</h3>
            <div class="space-y-4">
                <div class="flex gap-4 flex-wrap">
                    <button id="exportDataBtn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-white transition">
                        <i class="fas fa-download"></i> Export to CSV
                    </button>
                    <label class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-white cursor-pointer transition">
                        <i class="fas fa-upload"></i> Import CSV
                        <input type="file" id="importFile" accept=".csv" class="hidden">
                    </label>
                    <button id="resetDataBtn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-white transition">
                        <i class="fas fa-trash"></i> Reset All Data
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Stats Summary -->
        <div>
            <h3 class="text-lg font-semibold mb-4 border-b pb-2">Your Stats</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                    <p class="text-2xl font-bold" id="totalTasks">0</p>
                    <p class="text-sm">Total Tasks</p>
                </div>
                <div class="text-center p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                    <p class="text-2xl font-bold" id="totalHours">0</p>
                    <p class="text-sm">Total Hours</p>
                </div>
                <div class="text-center p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                    <p class="text-2xl font-bold" id="totalSessions">0</p>
                    <p class="text-sm">Study Sessions</p>
                </div>
                <div class="text-center p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                    <p class="text-2xl font-bold" id="memberSince">-</p>
                    <p class="text-sm">Member Since</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load user profile
    async function loadProfile() {
        const response = await fetch('/api/user/profile');
        const user = await response.json();
        document.getElementById('username').value = user.username;
        document.getElementById('fullName').value = user.full_name || '';
    }
    
    // Update profile
    document.getElementById('updateProfileBtn').addEventListener('click', async () => {
        const fullName = document.getElementById('fullName').value;
        const response = await fetch('/api/user/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ full_name: fullName })
        });
        if (response.ok) {
            showToast('Profile updated successfully!', 'success');
        } else {
            showToast('Failed to update profile', 'error');
        }
    });
    
    // Export data
    document.getElementById('exportDataBtn').addEventListener('click', () => {
        window.location.href = '/api/export/csv';
    });
    
    // Import data
    document.getElementById('importFile').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const formData = new FormData();
        formData.append('file', file);
        
        showLoading(true);
        const response = await fetch('/api/import/csv', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        showLoading(false);
        
        if (response.ok) {
            showToast(data.message, 'success');
        } else {
            showToast(data.error, 'error');
        }
    });
    
    // Reset data
    document.getElementById('resetDataBtn').addEventListener('click', async () => {
        if (confirm('WARNING: This will delete ALL your data. Are you sure?')) {
            const response = await fetch('/api/reset-data', { method: 'POST' });
            if (response.ok) {
                showToast('All data has been reset', 'success');
                setTimeout(() => window.location.reload(), 1500);
            } else {
                showToast('Failed to reset data', 'error');
            }
        }
    });
    
    // Load stats
    async function loadStats() {
        const response = await fetch('/api/stats/dashboard');
        const stats = await response.json();
        document.getElementById('totalTasks').innerText = stats.total_tasks || 0;
        document.getElementById('totalHours').innerText = stats.hours_month || 0;
    }
    
    loadProfile();
    loadStats();
</script>
{% endblock %}
