{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <i class="fas fa-chart-line text-5xl text-indigo-500 mb-3"></i>
            <h2 class="text-3xl font-bold">Welcome Back!</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Login to continue your journey</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-2">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="username" required 
                           class="w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input type="password" id="password" required 
                           class="w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700">
                </div>
            </div>
            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition transform hover:scale-105">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </form>
        
        <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-indigo-500 hover:underline">Register here</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        showLoading(true);
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            
            if (response.ok) {
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                showToast(data.error || 'Login failed', 'error');
            }
        } catch (error) {
            showToast('Network error', 'error');
        } finally {
            showLoading(false);
        }
    });
</script>
{% endblock %}
